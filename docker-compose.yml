services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-social-postgres
    environment:
      POSTGRES_USER: agent_social
      POSTGRES_PASSWORD: agent_social
      POSTGRES_DB: agent_social
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_social -d agent_social"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agent-social-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
